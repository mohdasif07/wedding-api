openapi: 3.0.1
info:
  title: Wedding Event Management API
  version: v1
  description: API for wedding event planning, guests, vendors, expenses, and photos
servers:
  - url: http://localhost:3000
paths:
  /api/v1/auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, password]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string }
                phone: { type: string }
                password: { type: string }
                password_confirmation: { type: string }
      responses:
        "201":
          description: User created
  /api/v1/auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Login successful
  /api/v1/auth/logout:
    post:
      summary: Logout
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Logged out
  /api/v1/profile:
    get:
      summary: Get current user profile
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Profile data
  /api/v1/dashboard:
    get:
      summary: Dashboard statistics
      tags: [Dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Dashboard stats
  /api/v1/events:
    get:
      summary: List events
      tags: [Events]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Event list
    post:
      summary: Create event
      tags: [Events]
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Event created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
